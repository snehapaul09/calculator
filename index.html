<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pretty Calculator - by sneha</title>
  <link rel="stylesheet" href="./cal.css">
</head>
<body>

<div class="container">

  <div class="calculator">

    <div class="slide-handle" id="slideHandle">
      <div class="handle-bar"></div>
      <span>HISTORY</span>
      <div class="handle-bar"></div>
    </div>

    <input type="text" id="inputBox" placeholder="0" readonly>

    <div>
      <button class="operator">AC</button>
      <button class="operator">DEL</button>
      <button class="operator">%</button>
      <button class="operator">/</button>
    </div>

    <div>
      <button>7</button>
      <button>8</button>
      <button>9</button>
      <button class="operator">*</button>
    </div>

    <div>
      <button>4</button>
      <button>5</button>
      <button>6</button>
      <button class="operator">-</button>
    </div>

    <div>
      <button>1</button>
      <button>2</button>
      <button>3</button>
      <button class="operator">+</button>
    </div>

    <div>
      <button>00</button>
      <button>0</button>
      <button>.</button>
      <button class="equalBtn">=</button>
    </div>
  </div>

  <div class="history-panel" id="historyPanel">
    <div class="history-header">
      <h3>History</h3>
      <div class="history-actions">
        <button class="history-clear" id="clearHistory">Clear All</button>
        <button class="history-close" id="closeHistory">▼ Close</button>
      </div>
    </div>
    <ul id="historyList">
      <li class="empty-msg" id="emptyMsg">No history yet</li>
    </ul>
  </div>

</div>

<script src="./cal.js"></script>
</body>
</html>
